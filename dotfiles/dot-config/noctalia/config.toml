[bar.default]
background_opacity = 0.97999999999999998
center = [ "media" ]
end = [ "tray", "clipboard", "volume", "bluetooth", "network", "battery", "clock", "notifications" ]
margin_edge = 0.0
margin_ends = 0.0
position = "bottom"
radius = 0
start = [ "launcher", "workspaces" ]
widget_spacing = 8

[desktop_widgets]
schema_version = 1
widget_order = []

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget]

[hooks]
battery_low_percent_threshold = 20

[idle]
behavior_order = [ "Screen Dim", "lock", "screen-off", "suspend" ]

    [idle.behavior."Screen Dim"]
    action = "command"
    command = "brightnessctl -s set 10"
    enabled = true
    resume_command = "brightnessctl -r"
    timeout = 300

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 600

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 720

    [idle.behavior.suspend]
    action = "suspend"
    enabled = true
    lock_before_suspend = true
    timeout = 900

[nightlight]
enabled = true
temperature_night = 4500

[notification]
offset_y = 6.0

[osd]
offset_y = 6.0

[shell]
avatar_path = "/home/nathan/.dotfiles/.avatar.jpg"
screen_time_enabled = true
settings_show_advanced = true
telemetry_enabled = false

    [shell.panel]
    clipboard_placement = "attached"
    launcher_categories = false
    open_near_click_clipboard = true
    open_near_click_control_center = true
    open_near_click_session = true
    open_near_click_wallpaper = true
    transparency_mode = "soft"

[theme]
builtin = "Catppuccin"
community_palette = "Cyberpunk"

    [theme.templates]
    builtin_ids = [ "btop", "gtk3", "gtk4", "hyprland", "kitty", "qt" ]
    community_ids = [ "spicetify", "discord", "yazi", "zathura" ]

[wallpaper]
directory = "/home/nathan/MEGA/Pictures/Backgrounds"

    [wallpaper.default]
    path = "/home/nathan/MEGA/Pictures/Backgrounds/1618179773635.jpg"

    [wallpaper.last]
    path = "/home/nathan/MEGA/Pictures/Backgrounds/1618179773635.jpg"

    [wallpaper.monitors.eDP-1]
    path = "/home/nathan/MEGA/Pictures/Backgrounds/1618179773635.jpg"

[weather]
address = "Bochum, Germany"

[widget.clock]
format = "{:%a %b %d %X}"

[widget.media]
title_scroll = "on_hover"

[widget.network]
show_label = false

[widget.tray]
drawer = true

[widget.volume]
show_label = false

[widget.workspaces]
display = "none"
empty_color = "on_surface"
occupied_color = "on_surface_variant"
scale = 0.84999999999999998
